name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src tests

      - name: Test
        run: pytest tests/ -q

  dbt-compile:
    # Parse-only check: validates model SQL, refs, and project config
    # without needing Snowflake credentials in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dbt
        run: pip install "dbt-snowflake>=1.8"

      - name: Write dummy profile (parse never connects)
        working-directory: src/dbt
        run: |
          cat > profiles.yml <<'EOF'
          civiclens:
            target: ci
            outputs:
              ci:
                type: snowflake
                account: ci-dummy
                user: ci
                password: ci
                role: CIVICLENS
                warehouse: CIVICLENS_WH
                database: CIVICLENS
                schema: PUBLIC
          EOF

      - name: dbt parse
        working-directory: src/dbt
        env:
          DBT_PROFILES_DIR: .
        run: dbt parse --no-partial-parse
