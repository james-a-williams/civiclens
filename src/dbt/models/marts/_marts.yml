version: 2

models:
  - name: dim_candidates
    description: >
      One row per candidacy (person x office sought x cycle) across federal
      (FEC), NY state (BOE), and NYC local (CFB) sources. Powers candidate
      search and profiles.
    columns:
      - name: candidacy_key
        tests:
          - unique
          - not_null
      - name: display_name
        tests:
          - not_null
      - name: level
        tests:
          - accepted_values:
              arguments:
                values: ['federal', 'state', 'local']
      - name: source_system
        tests:
          - accepted_values:
              arguments:
                values: ['fec', 'ny_boe', 'nyc_cfb']

  - name: dim_legislators
    description: >
      One row per sitting legislator, federal (Congress.gov) and state
      (OpenStates). person_key links to the identity crosswalk.
    columns:
      - name: legislator_id
        tests:
          - unique
          - not_null
      - name: person_key
        tests:
          - not_null
      - name: chamber
        tests:
          - accepted_values:
              arguments:
                values: ['house', 'senate']

  - name: dim_districts
    description: >
      One row per geography — congressional districts and states — with ACS
      demographic estimates and derived rates.
    columns:
      - name: district_key
        tests:
          - unique
          - not_null
      - name: geo_level
        tests:
          - accepted_values:
              arguments:
                values: ['congressional_district', 'state']

  - name: dim_committees
    description: One row per FEC committee with decoded type/designation labels.
    columns:
      - name: committee_id
        tests:
          - unique
          - not_null

  - name: fct_contributions
    description: >
      One row per contribution transaction, unified across sources. NYC CFB
      only until FEC Schedule A lands in Phase 3. Independent-spender (IS)
      committees are excluded.
    columns:
      - name: contribution_key
        tests:
          - unique
          - not_null
      - name: candidacy_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_candidates')
                field: candidacy_key
      - name: donor_key
        tests:
          - not_null
      - name: amount
        tests:
          - not_null

  - name: dim_bills
    description: >
      One row per bill, unified across state (OpenStates) and federal (Congress.gov).
      bill_key is the stable FK for fct_bill_sponsorships and fct_votes.
      abstract and url are null for Congress bills until per-bill detail is fetched.
    columns:
      - name: bill_key
        tests:
          - unique
          - not_null
      - name: source_system
        tests:
          - accepted_values:
              arguments:
                values: ['openstates', 'congress']
      - name: level
        tests:
          - accepted_values:
              arguments:
                values: ['state', 'federal']

  - name: fct_bill_sponsorships
    description: >
      One row per person × bill sponsorship, unified across OpenStates (state)
      and Congress.gov (federal). is_primary is null for Congress rows — the
      sponsored-legislation endpoint does not distinguish primary vs. cosponsor.
      Only person-type sponsors are included; organization sponsors are excluded.
    columns:
      - name: sponsorship_key
        tests:
          - unique
          - not_null
      - name: bill_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_bills')
                field: bill_key
              config:
                severity: warn

  - name: fct_votes
    description: >
      One row per person × roll call, unified across OpenStates (state), House
      Clerk XML (federal House), and Senate LIS XML (federal Senate).
      person_key is null for Senate rows — lis_member_id has no crosswalk to
      bioguide_id yet (Phase 3 gap). bill_key is null for procedural votes not
      tied to a specific bill. voter_name is kept for display and future resolution.
    columns:
      - name: vote_key
        tests:
          - unique
          - not_null
      - name: vote_option
        tests:
          - accepted_values:
              arguments:
                values: ['yes', 'no', 'abstain', 'present']
              config:
                severity: warn
      - name: bill_key
        tests:
          - relationships:
              arguments:
                to: ref('dim_bills')
                field: bill_key
              config:
                severity: warn

  - name: fct_candidate_finance
    description: >
      One row per candidacy per cycle. Field coverage varies by source system
      — the coverage column tells the API/UI which fields are meaningful.
    columns:
      - name: candidacy_key
        tests:
          - unique
          - not_null
          # warn only: FEC totals for a cycle include candidates whose
          # election year is outside the candidates-search snapshot
          - relationships:
              arguments:
                to: ref('dim_candidates')
                field: candidacy_key
              config:
                severity: warn
      - name: coverage
        tests:
          - accepted_values:
              arguments:
                values: ['fec', 'ny_boe', 'nyc_cfb']
